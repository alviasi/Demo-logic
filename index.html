<!DOCTYPE html>
<html>
<head>
  <title>PMU Pronostique King</title>

  <meta name="description" content="PMU pronostic gagnant, horse racing prediction France">
  <meta name="keywords" content="PMU pronostic gagnant, PMU tips">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #667eea, #764ba2);
      color: white;
      padding: 20px;
    }

    #box {
      width: 250px;
      height: 120px;
      border-radius: 15px;
      font-size: 30px;
      padding: 20px;
      margin: 30px auto;
      background: white;
      color: black;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: #00c9a7;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>PMU PRONOSTIQUE KING 👑</h1>

<div id="box">Loading...</div>

<h3>🔐 Login</h3>

<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="submitData()">Login</button>

<p id="loginMsg"></p>

<h3>📥 Data Entry</h3>

<form id="myForm">
  <input name="col1" placeholder="A1"><br>
  <input name="col2" placeholder="A2"><br>
  <input name="col3" placeholder="A3"><br>
  <input name="col4" placeholder="A4"><br>
  <input name="col5" placeholder="A5"><br>
  <input name="col6" placeholder="A6"><br>

  <button type="submit">Submit</button>
</form>

<p id="msg"></p>

<script>

// LOGIN
function submitData() {
  var username = document.getElementById("username").value;
  var password = document.getElementById("password").value;

  fetch("https://script.google.com/macros/s/AKfycbzVA6I3S-3-7ZLnG-ojTfN2T6oDjA_GZ2x-l6vj4Mtg8fX7Eh9LuDSa2PaHw1y-iPfY/exec", {
    method: "POST",
    body: new URLSearchParams({
      username: username,
      password: password
    })
  })
  .then(res => res.text())
  .then(data => {
    if(data === "success"){
      document.getElementById("loginMsg").innerText = "Login Success ✅";
    } else {
      document.getElementById("loginMsg").innerText = "Wrong Username/Password ❌";
    }
  });
}

// FORM SUBMIT
document.getElementById("myForm").addEventListener("submit", function(e){
  e.preventDefault();

  let formData = new FormData(this);

  fetch("https://script.google.com/macros/s/AKfycbzVA6I3S-3-7ZLnG-ojTfN2T6oDjA_GZ2x-l6vj4Mtg8fX7Eh9LuDSa2PaHw1y-iPfY/exec", {
    method: "POST",
    body: formData
  })
  .then(res => res.text())
  .then(data => {
    document.getElementById("msg").innerText = "Data Saved ✅";
    document.getElementById("myForm").reset();
  });
});

// LOAD B1
function loadData() {
  fetch("https://script.google.com/macros/s/AKfycbzVA6I3S-3-7ZLnG-ojTfN2T6oDjA_GZ2x-l6vj4Mtg8fX7Eh9LuDSa2PaHw1y-iPfY/exec")
    .then(res => res.text())
    .then(data => {
      document.getElementById("box").innerText = data;
    });
}

loadData();
setInterval(loadData, 3000);

</script>

</body>
</html>
