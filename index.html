<!DOCTYPE html>
<html>
<head>
  <title>Exact Excel Logic</title>
  <style>
    body { font-family: Arial; text-align: center; }
    input { padding: 8px; margin: 5px; width: 100px; }
    .one { color: green; font-weight: bold; }
    .zero { color: red; }
  </style>
</head>
<body>

<h2>Excel Logic (F → G)</h2>

<div id="inputs"></div>

<button onclick="calculate()">Calculate</button>

<div id="result"></div>

<script>
// Create inputs for F28–F53
const inputDiv = document.getElementById("inputs");
for (let i = 28; i <= 53; i++) {
  let input = document.createElement("input");
  input.placeholder = "F" + i;
  input.id = "f" + i;
  inputDiv.appendChild(input);
}

function calculate() {
  let resultHTML = "";

  for (let i = 28; i <= 53; i++) {
    let val = document.getElementById("f" + i).value;

    if (val === "") continue;

    let last2 = parseInt(val.toString().slice(-2)) || 0;

    let result = (last2 < 10) ? last2 : 0;

    resultHTML += `
      <div>
        G${i} → <span class="${result ? 'one' : 'zero'}">${result}</span>
      </div>
    `;
  }

  document.getElementById("result").innerHTML = resultHTML;
}
</script>

</body>
</html>
