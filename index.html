<!DOCTYPE html>
<html>
<head>
  <title>Public</title>

  <style>
    #boxes {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }

    .box {
      border: 2px solid black;
      padding: 20px;
      width: 80px;
      text-align: center;
      font-size: 20px;
      background: lightblue;
    }
  </style>
</head>
<body>

<h2 style="text-align:center;">Public Data</h2>

<div id="boxes"></div>

<h3 style="text-align:center;">
  Price: <span id="price">Loading...</span>
</h3>

<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

async function loadData() {
  const querySnapshot = await getDocs(collection(db, "data"));

  querySnapshot.forEach((doc) => {
    const d = doc.data();

    const container = document.getElementById("boxes");

    container.innerHTML = `
      <div class="box">${d.a1 || ""}</div>
      <div class="box">${d.a2 || ""}</div>
      <div class="box">${d.a3 || ""}</div>
      <div class="box">${d.a4 || ""}</div>
      <div class="box">${d.a5 || ""}</div>
      <div class="box">${d.a6 || ""}</div>
    `;

    document.getElementById("price").innerText = d.b1 || "No Price";
  });
}

loadData();
</script>

</body>
</html>
