<!DOCTYPE html>
<html>
<head>
  <title>Excel Exact G Logic</title>
  <style>
    body { font-family: Arial; text-align: center; }
    input { padding: 6px; margin: 3px; width: 90px; }
    .one { color: green; font-weight: bold; }
    .zero { color: red; }
  </style>
</head>
<body>

<h2>Enter F Values (Excel Same)</h2>

<div id="inputs"></div>

<br>
<button onclick="calculate()">Calculate G</button>

<h3>Results</h3>
<div id="result"></div>

<script>
// Create inputs F28–F53
const div = document.getElementById("inputs");

for (let i = 28; i <= 53; i++) {
  let input = document.createElement("input");
  input.placeholder = "F" + i;
  input.id = "f" + i;
  div.appendChild(input);
}

function calculate() {
  let html = "";

  for (let i = 28; i <= 53; i++) {
    let val = document.getElementById("f" + i).value;

    if (!val) continue;

    let last2 = parseInt(val.toString().slice(-2)) || 0;
    let g = (last2 < 10) ? last2 : 0;

    html += `
      <div>
        F${i} = ${val} → 
        G${i} = <span class="${g ? 'one' : 'zero'}">${g}</span>
      </div>
    `;
  }

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
