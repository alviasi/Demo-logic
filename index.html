<!DOCTYPE html>
<html>
<head>
  <title>Data Entry</title>

  <style>
    .container {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .box {
      width: 80px;
      height: 50px;
      text-align: center;
      font-size: 18px;
    }

    .priceBox {
      background: yellow;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<hr>

<h2>Enter Data</h2>

<div class="container">
  <input class="box" id="a1">
  <input class="box" id="a2">
  <input class="box" id="a3">
  <input class="box" id="a4">
  <input class="box" id="a5">
  <input class="box" id="a6">

  <!-- 7th box -->
  <input class="box priceBox" id="price" readonly>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqPLAXT1pyRuR3BgAl9PyoXZjBEH861Gg",
  authDomain: "me-win.firebaseapp.com",
  projectId: "me-win",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// LOGIN
window.login = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      alert("Login Success ✅");
      loadPrice(); // load B1 after login
    })
    .catch(err => alert(err.message));
};

// LOAD PRICE (B1)
async function loadPrice() {
  const docRef = doc(db, "data", "main");
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    const data = docSnap.data();
    document.getElementById("price").value = data.price || "";
  }
}
</script>

</body>
</html>
