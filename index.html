<!DOCTYPE html>
<html>
<body>

<h2>Data Entry</h2>

<form id="form">
  <input name="col1" placeholder="A"><br><br>
  <input name="col2" placeholder="B"><br><br>
  <input name="col3" placeholder="C"><br><br>
  <input name="col4" placeholder="D"><br><br>
  <input name="col5" placeholder="E"><br><br>
  <input name="col6" placeholder="F"><br><br>

  <button type="submit">Submit</button>
</form>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  fetch("https://script.google.com/macros/s/AKfycbzVA6I3S-3-7ZLnG-ojTfN2T6oDjA_GZ2x-l6vj4Mtg8fX7Eh9LuDSa2PaHw1y-iPfY/exec", {
    method: "POST",
    mode: "no-cors",   // 🔥 IMPORTANT
    body: new FormData(this)
  });

  alert("Data Submitted!");
});
</script>

</body>
</html>
