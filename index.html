<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Excel Input Page</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    input { display: block; margin: 10px 0; padding: 8px; width: 200px; }
    button { padding: 10px 15px; }
  </style>
</head>
<body>  <h2>Excel Input Form</h2>  <input type="number" id="box1" placeholder="Box 1 (A1)">
  <input type="number" id="box2" placeholder="Box 2 (A2)">
  <input type="number" id="box3" placeholder="Box 3 (A3)"><button onclick="generateExcel()">Download Excel</button>

  <script>
    function generateExcel() {
      let val1 = document.getElementById('box1').value;
      let val2 = document.getElementById('box2').value;
      let val3 = document.getElementById('box3').value;

      let data = [
        [val1],
        [val2],
        [val3]
      ];

      let ws = XLSX.utils.aoa_to_sheet(data);
      let wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Sheet1");

      XLSX.writeFile(wb, "output.xlsx");
    }
  </script></body>
</html>
