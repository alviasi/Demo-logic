<!DOCTYPE html>
<html>
<head>
  <title>Public</title>
</head>
<body>

<h2>Public Data</h2>

<div id="boxes"></div>

<h3>Price: <span id="price">Loading...</span></h3>

<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

async function loadData() {
  const querySnapshot = await getDocs(collection(db, "data"));

  querySnapshot.forEach((doc) => {
    const d = doc.data();

    document.getElementById("boxes").innerHTML = `
      <div>${d.a1}</div>
      <div>${d.a2}</div>
      <div>${d.a3}</div>
      <div>${d.a4}</div>
      <div>${d.a5}</div>
      <div>${d.a6}</div>
    `;

    document.getElementById("price").innerText = d.b1;
  });
}

loadData();
</script>

</body>
</html>
