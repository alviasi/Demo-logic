<!DOCTYPE html>
<html>
<head>
  <title>Excel Logic Web Version</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 30px;
      background: #f4f4f4;
    }
    input {
      padding: 10px;
      margin: 5px;
      width: 80px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-size: 18px;
      color: green;
    }
  </style>
</head>
<body>

  <h2>D1 Sheet Calculator</h2>

  <div>
    <input type="number" id="a10" placeholder="A10">
    <input type="number" id="a11" placeholder="A11">
    <input type="number" id="a12" placeholder="A12">
    <input type="number" id="a13" placeholder="A13">
  </div>

  <button onclick="calculate()">Calculate</button>

  <div id="result"></div>

  <script>
    function calculate() {
      let a10 = parseFloat(document.getElementById("a10").value) || 0;
      let a11 = parseFloat(document.getElementById("a11").value) || 0;
      let a12 = parseFloat(document.getElementById("a12").value) || 0;
      let a13 = parseFloat(document.getElementById("a13").value) || 0;

      let results = [];

      // 🔥 GUESS LOGIC (Excel-style simulation)
      for (let i = 28; i <= 63; i++) {
        let value = (a10 * i) + (a11 * 2) - (a12) + (a13 * (i % 5));

        // Sirf > 0 values show karni hain
        if (value > 0) {
          results.push("G" + i + " = " + value);
        }
      }

      // Display
      if (results.length > 0) {
        document.getElementById("result").innerHTML = results.join("<br>");
      } else {
        document.getElementById("result").innerHTML = "No values > 0";
      }
    }
  </script>

</body>
</html>
