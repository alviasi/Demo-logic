<!DOCTYPE html>
<html>
<head>
  <title>Data Entry</title>

  <style>
    .container {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .box {
      width: 80px;
      height: 50px;
      text-align: center;
      font-size: 18px;
    }

    .priceBox {
      background: yellow;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>
<input type="file" id="fileInput" accept=".xlsx">
<button onclick="uploadExcel()">Upload Excel</button>
<hr>

<h2>Enter Data</h2>

<div class="container">
  <input class="box" id="a1">
  <input class="box" id="a2">
  <input class="box" id="a3">
  <input class="box" id="a4">
  <input class="box" id="a5">
  <input class="box" id="a6">
  <input class="box priceBox" id="price" readonly>
</div>

<br>
<button onclick="saveData()">Save Data</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqPLAXT1pyRuR3BgAl9PyoXZjBEH861Gg",
  authDomain: "me-win.firebaseapp.com",
  projectId: "me-win",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// LOGIN
window.login = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      alert("Login Success ✅");
      loadPrice();
    })
    .catch(err => alert(err.message));
};

// LOAD PRICE (B1)
async function loadPrice() {
  const docRef = doc(db, "data", "main");
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    document.getElementById("price").value = docSnap.data().price || "";
  }
}

// SAVE DATA
window.saveData = async function() {
  const a1 = document.getElementById("a1").value;
  const a2 = document.getElementById("a2").value;
  const a3 = document.getElementById("a3").value;
  const a4 = document.getElementById("a4").value;
  const a5 = document.getElementById("a5").value;
  const a6 = document.getElementById("a6").value;
  const price = document.getElementById("price").value;

  try {
    await addDoc(collection(db, "entries"), {
      a1, a2, a3, a4, a5, a6, price
    });

    alert("Data Saved ✅");
  } catch (e) {
    alert(e.message);
  }
};
</script>

</body>
</html>
