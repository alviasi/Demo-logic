<form id="form">
  <input name="col1" placeholder="Column A"><br>
  <input name="col2" placeholder="Column B"><br>
  <input name="col3" placeholder="Column C"><br>
  <input name="col4" placeholder="Column D"><br>
  <input name="col5" placeholder="Column E"><br>
  <input name="col6" placeholder="Column F"><br>
  <button type="submit">Submit</button>
</form>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  fetch("YOUR_GOOGLE_SCRIPT_URL", {
    method: "POST",
    body: new FormData(this)
  });

  alert("Data Submitted!");
});
</script>
