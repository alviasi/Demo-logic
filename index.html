<!DOCTYPE html>
<html>
<head>
  <title>Data Entry + View</title>
</head>
<body>

<h2>Data Entry Form</h2>

<form id="form">
  <input name="col1" placeholder="Column A"><br><br>
  <input name="col2" placeholder="Column B"><br><br>
  <input name="col3" placeholder="Column C"><br><br>
  <input name="col4" placeholder="Column D"><br><br>
  <input name="col5" placeholder="Column E"><br><br>
  <input name="col6" placeholder="Column F"><br><br>
  <button type="submit">Submit</button>
</form>

<h2>Column B Data</h2>
<ul id="colB"></ul>

<h2>Column AJ Data</h2>
<ul id="colAJ"></ul>

<script>
// 🔹 FORM SUBMIT (DATA ENTRY)
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  fetch("https://script.google.com/macros/s/AKfycbzVA6I3S-3-7ZLnG-ojTfN2T6oDjA_GZ2x-l6vj4Mtg8fX7Eh9LuDSa2PaHw1y-iPfY/exec", {
    method: "POST",
    body: new FormData(this)
  })
  .then(res => alert("Data Submitted!"));
});

// 🔹 DATA SHOW
fetch("https://opensheet.elk.sh/1IWFngGmDQ40FOA1NTeaNoUNY7hcfOevf/Sheet1")
.then(res => res.json())
.then(data => {

  let listB = document.getElementById("colB");
  let listAJ = document.getElementById("colAJ");

  data.forEach(row => {

    if(row.B){
      let li = document.createElement("li");
      li.textContent = row.B;
      listB.appendChild(li);
    }

    if(row.AJ){
      let li2 = document.createElement("li");
      li2.textContent = row.AJ;
      listAJ.appendChild(li2);
    }

  });

});
</script>

</body>
</html>
